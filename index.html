<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fachblick München</title>
    <meta
      name="description"
      content="Fachblick München. Brot, Bier, Disziplin."
    />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="poster">
      <div class="top-banner">BROT · BIER · DISZIPLIN</div>

      <section class="hero">
        <p class="kicker">ABFLUG</p>
        <h1>FACHBLICK<br />MÜNCHEN</h1>
        <p class="lead">
          Die Au Pair zitterr so stark, dass die Essstäbchen knirschen.
        </p>

        <div class="countdown-label">Abflug Molde · Donnerstag 8. Oktober · 06:45</div>

        <div class="countdown" aria-label="Nedtelling til avgang">
          <div class="count-card">
            <span>TAGE</span>
            <strong id="days">0</strong>
          </div>
          <div class="count-card">
            <span>STUNDEN</span>
            <strong id="hours">0</strong>
          </div>
          <div class="count-card">
            <span>MINUTEN</span>
            <strong id="minutes">0</strong>
          </div>
          <div class="count-card count-card--status">
            <span>STATUS</span>
            <strong id="status">AKTIV</strong>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
